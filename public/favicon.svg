<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="30" fill="#3B2C84"/>
  <g transform="translate(32,28)" fill="none" stroke="#fff" stroke-width="2" stroke-linejoin="round">
    <!-- Cube/book symbol inspired by Hanshin emblem -->
    <polygon points="0,-12 10.4,-6 10.4,6 0,12 -10.4,6 -10.4,-6" fill="none"/>
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-10.4" y1="-6" x2="10.4" y2="-6"/>
    <line x1="-10.4" y1="6" x2="10.4" y2="6"/>

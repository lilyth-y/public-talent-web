name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - name: Resolve Supabase env for Vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          EFFECTIVE_SUPABASE_URL="${VITE_SUPABASE_URL:-$SUPABASE_URL}"
          EFFECTIVE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-$SUPABASE_ANON_KEY}"
          if [ -z "$EFFECTIVE_SUPABASE_URL" ] || [ -z "$EFFECTIVE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing GitHub secrets for Supabase."
            echo "::error::Set VITE_SUPABASE_URL/VITE_SUPABASE_ANON_KEY (or SUPABASE_URL/SUPABASE_ANON_KEY)."
            exit 1
          fi
          echo "VITE_SUPABASE_URL=$EFFECTIVE_SUPABASE_URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$EFFECTIVE_SUPABASE_ANON_KEY" >> "$GITHUB_ENV"

      - run: npm run build

      - run: npx wrangler@latest pages deploy dist --project-name=hanshin-public-talent --branch=${{ github.head_ref || github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
